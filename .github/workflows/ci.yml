name: CI

# Runs CI for pull requests and pushes to any branch
# This allows fork developers to get CI feedback on their branches
on:
  pull_request:
  push:
    branches:
      - '**'  # Run on all branches
  # schedule:
  #   - cron: 0 14 * * MON-FRI # Every weekday at 14:00 UTC

permissions: {}

jobs:
  # Check that binary can be built
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      matrix:
        go-version: [1.24.x]
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: ${{ matrix.go-version }}
    - name: Install dependencies
      run: go mod download
    - name: Build
      run: go build -v -o /dev/null
  
  # Check that binary can be built on Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version-file: 'go.mod'
    - name: Install dependencies
      run: go mod download
    - name: Build Windows AMD64
      shell: pwsh
      run: |
        $env:GOOS = "windows"
        $env:GOARCH = "amd64"
        go build -v -o opkssh-amd64.exe
    - name: Build Windows ARM64
      shell: pwsh
      run: |
        $env:GOOS = "windows"
        $env:GOARCH = "arm64"
        go build -v -o opkssh-arm64.exe
    - name: Test binary works
      shell: pwsh
      run: |
        .\opkssh-amd64.exe --version
  
  # Run Windows unit tests
  test-windows:
    name: 'Windows Tests'
    runs-on: windows-latest
    timeout-minutes: 8
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version-file: 'go.mod'
    - name: Install dependencies
      run: go mod download
    - name: Run unit tests
      shell: pwsh
      run: go test ./...
  
  # Run integration tests
  test:
    needs: build
    name: 'Integration Tests'
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 8
    strategy:
      matrix:
        runs_on: [ubuntu-24.04, ubuntu-24.04-arm]
        os: [ubuntu, centos, arch, opensuse]
        exclude:
          - runs_on: ubuntu-24.04-arm
            os: arch
    env:
      OS_TYPE: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: 'go.mod'
    - name: Install Docker
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
    - name: Install dependencies
      run: go mod download
    - name: Run integration tests
      run: go test -tags=integration ./test/integration -timeout=15m -count=1 -parallel=2 -v
  lint-scripts:
    name: Shell Scripts Lint & Test
    runs-on: ubuntu-24.04
    container:
      image: opensuse/tumbleweed:latest@sha256:3899fe58026bc7425fdcd911826bff6f4846822c91e273fc18a3bfb9a7b973dc
    steps:
    - name: Install packages
      run: |
        zypper refresh
        zypper --non-interactive install --no-recommends git wget ShellCheck shunit2 findutils python313-bashate
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Run ShellCheck
      run: |
        echo "Running ShellCheck on all .sh files under scripts/"
        find scripts/ -type f -name '*.sh' | while read -r file; do
          echo "üîç Checking $file"
          shellcheck "$file"
        done
    - name: Run shunit2 tests
      run: |
        echo "Running shUnit2 on all .sh files under scripts/test"
        find scripts/test -type f -name '*.sh' | while read -r file; do
          echo "üîç Checking $file"
          bash "$file"
        done
    - name: Check scripts with bashate
      run: |
        echo "Running bashate on all .sh files under scripts/"
        find scripts/ -type f -name '*.sh' | while read -r file; do
          echo "üîç Checking $file"
          bashate -i E006 "$file"
        done
    - name: Check wget url pipe
      run: |
        set -euo pipefail

        RAW_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/scripts/install-linux.sh"
        echo "Testing URL: $RAW_URL"
        set +e
        output=$(wget -qO- "$RAW_URL" | bash 2>&1)
        result=$?
        set -e

        if [[ "$result" -ne 1 ]]; then
          echo "‚ùå Expected exit code 1 but got $result"
          exit 1
        fi

        if ! grep -q "Error: sudo is not installed. Please install it first" <<< "$output"; then
          echo "‚ùå Expected error message not found in output"
          exit 1
        fi

        echo "‚úÖ Script behaved as expected when piping to bash"
